<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafael Coronel Portfolio - CyberAssist</title>

    <style>
        /* =========================
           RESET GLOBAL
        ========================= */
        *{ 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
        }

        /* =========================
           NAVBAR
        ========================= */
        .navbar{
            display: flex; 
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #111;
            color: white;
            position: relative; /* importante para o menu mobile */
        }

        .logo{
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00ffcc;
        }

        /* =========================
           BOTÃO HAMBURGER
        ========================= */
        .options {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        /* =========================
           RESPONSIVIDADE
        ========================= */
        @media (max-width: 768px) {

            .nav-links{
                display: none;
                flex-direction: column;
                background-color: #111;
                position: absolute;
                top: 60px;
                right: 0;
                width: 100%;
                text-align: center;
                padding: 20px 0;
            }

            .nav-links li{
                margin: 15px 0;
            }

            .nav-links.active {
                display: flex;
            }

            .options {
                display: block;
            }
        }
    </style>
</head>

<body>
    
    <nav class="navbar">
        <div class="logo">CyberAssist</div>

        <!-- Agora está correto usando UL -->
        <ul class="nav-links" id="navLinks">
            <li><a href="#">Início</a></li>
            <li><a href="#">Serviços</a></li>
            <li><a href="#">Palestras</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>

        <div class="options" id="options">
            ☰
        </div>
    </nav>

    <!-- JAVASCRIPT -->
    <script>
        const options = document.getElementById("options");
        const navLinks = document.getElementById("navLinks");

        options.addEventListener("click", () => {
            navLinks.classList.toggle("active");
        });
    </script>

</body>
</html>
